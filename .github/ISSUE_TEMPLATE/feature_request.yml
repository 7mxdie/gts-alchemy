name: "💡 Feature Request"
description: Suggest a new feature or improvement.
title: "[Feature]: "
labels: ["💡 enhancement"]

body:
  - type: textarea
    id: idea
    attributes:
      label: Feature
      description: Describe your idea.
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why would this be useful?

  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - New feature
        - UI improvement
        - Performance
        - Data improvement
        - Quality of life